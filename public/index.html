<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNSmasq server</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #ccc;
            --header-bg: #f2f2f2;
            --row-even-bg: #f9f9f9;
            --row-hover-bg: #e8f4f8;
            --timestamp-color: #444;
            --system-info-bg: #f5f5f5;
            --stat-bg: #fff;
            --stat-label-color: #333;
            --stat-value-color: #000;
            --banner-error-bg: #fee;
            --banner-error-color: #c00;
            --banner-error-border: #c00;
            --banner-ok-bg: #efe;
            --banner-ok-color: #080;
            --banner-ok-border: #080;
            --focus-outline: #0066cc;
        }
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --border-color: #666;
            --header-bg: #2a2a2a;
            --row-even-bg: #252525;
            --row-hover-bg: #333;
            --timestamp-color: #bbb;
            --system-info-bg: #222;
            --stat-bg: #2a2a2a;
            --stat-label-color: #aaa;
            --stat-value-color: #f0f0f0;
            --banner-error-bg: #4a2a2a;
            --banner-error-color: #ff6666;
            --banner-error-border: #ff6666;
            --banner-ok-bg: #2a3a2a;
            --banner-ok-color: #66ff66;
            --banner-ok-border: #66ff66;
            --focus-outline: #ffcc00;
        }
        [data-theme="retro"] {
            --bg-color: #110a00;
            --text-color: #ffb000;
            --border-color: #664400;
            --header-bg: #332200;
            --row-even-bg: #1a1200;
            --row-hover-bg: #2a1f00;
            --timestamp-color: #cc8800;
            --system-info-bg: #0f0800;
            --stat-bg: #1a1400;
            --stat-label-color: #cc8800;
            --stat-value-color: #ffb000;
            --banner-error-bg: #2a0a00;
            --banner-error-color: #ff6600;
            --banner-error-border: #aa4400;
            --banner-ok-bg: #2a1a00;
            --banner-ok-color: #ffcc44;
            --banner-ok-border: #cc8800;
            --focus-outline: #ffcc44;
        }
        body {
            font-family: monospace;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background-color: var(--header-bg);
            color: var(--text-color);
        }
        tr:nth-child(even) {
            background-color: var(--row-even-bg);
        }
        tr:hover {
            background-color: var(--row-hover-bg);
        }
        .copyable {
            cursor: pointer;
            position: relative;
            padding-right: 55px;
            transition: background-color 0.15s;
        }
        .copyable:hover {
            background-color: var(--row-hover-bg);
        }
        .copyable .copy-icon {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: var(--text-color);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .copyable:hover .copy-icon {
            opacity: 0.5;
        }
        .copyable:hover .copy-icon:hover {
            opacity: 1;
        }
        .copyable .copied {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            font-weight: bold;
            color: #155724;
            background-color: #d4edda;
            padding: 2px 6px;
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .copyable .copied.visible {
            opacity: 1;
        }
        [data-theme="dark"] .copyable .copied {
            color: #c3e6cb;
            background-color: #28a745;
        }
        [data-theme="retro"] body {
            text-shadow: 0 0 6px rgba(255, 176, 0, 0.4);
        }
        [data-theme="terminal"] body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0, 0, 0, 0.3) 2px, rgba(0, 0, 0, 0.3) 3px);
            pointer-events: none;
            z-index: 9999;
        }
        [data-theme="terminal"] .copyable .copied {
            color: #33ff33;
            background-color: #0d330d;
        }
        .timestamp {
            color: var(--timestamp-color);
            font-size: 14px;
        }
        .content-box {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--system-info-bg);
        }
        .system-info {
            margin: 0;
            padding: 0;
            border: none;
            background-color: transparent;
        }
        .system-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        .system-stat {
            background-color: var(--stat-bg);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .system-stat-label {
            font-size: 12px;
            color: var(--stat-label-color);
        }
        .system-stat-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--stat-value-color);
        }
        #statusBanner {
            display: none;
            padding: 10px 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 14px;
        }
        #statusBanner.error {
            display: block;
            background-color: var(--banner-error-bg);
            color: var(--banner-error-color);
            border: 1px solid var(--banner-error-border);
        }
        #statusBanner.ok {
            display: block;
            background-color: var(--banner-ok-bg);
            color: var(--banner-ok-color);
            border: 1px solid var(--banner-ok-border);
        }
        #themeToggle {
            padding: 8px 12px;
            margin-left: 15px;
            background-color: var(--header-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            z-index: 1000;
        }
        #themeToggle:hover {
            opacity: 0.9;
        }
        #themeToggle:focus {
            outline: 3px solid var(--focus-outline);
            outline-offset: 2px;
        }
        button:focus {
            outline: 3px solid var(--focus-outline);
            outline-offset: 2px;
        }
        a:focus, [tabindex]:focus {
            outline: 3px solid var(--focus-outline);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="content-box">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h1 style="margin: 0;">DNSmasq server</h1>
            <button id="themeToggle" role="button" title="Switch theme" aria-label="Switch theme">🌙 Dark Mode</button>
        </div>
        <div class="system-info" style="margin: 0; padding: 0; border: none; background: none;">
            <h3 style="margin-bottom: 10px;" id="systemInfoLabel">System Information</h3>
            <div class="system-stats" role="list">
                <div class="system-stat" role="listitem">
                    <div class="system-stat-label">CPU Load (1m)</div>
                    <div class="system-stat-value" id="cpuLoad">--</div>
                </div>
                <div class="system-stat" role="listitem">
                    <div class="system-stat-label">Memory Usage</div>
                    <div class="system-stat-value" id="memUsage">--%</div>
                </div>
                <div class="system-stat" role="listitem">
                    <div class="system-stat-label" id="uptimeLabel">Uptime</div>
                    <div class="system-stat-value" id="uptime">--</div>
                </div>
                <div class="system-stat" role="listitem">
                    <div class="system-stat-label">Hostname</div>
                    <div class="system-stat-value" id="hostname">--</div>
                </div>
            </div>
        </div>
    </div>
    <div id="statusBanner" aria-live="polite" role="alert"></div>
    <div class="content-box">
        <h3 style="margin-top: 0;">Current DHCP leases: <span id="currentLeaseCount">--</span></h3>
        <p class="timestamp" aria-live="polite">Last lease file update: <span id="lastRefreshed"></span></p>
        <table style="margin-top: 10px;" aria-label="DHCP leases table">
            <thead>
                <tr>
                    <th scope="col">Expiry &#9660;</th>
                    <th scope="col">MAC Address</th>
                    <th scope="col">IP Address</th>
                    <th scope="col">Hostname</th>
                </tr>
            </thead>
            <tbody id="leasesTable" aria-label="List of DHCP lease entries">
            </tbody>
        </table>
    </div>
    <script>
        // === DOM Element References ===
        const tableBody = document.getElementById("leasesTable");
        const lastRefreshedSpan = document.getElementById("lastRefreshed");
        const cpuLoadEl = document.getElementById("cpuLoad");
        const memUsageEl = document.getElementById("memUsage");
        const uptimeEl = document.getElementById("uptime");
        const uptimeLabelEl = document.getElementById("uptimeLabel");
        const hostnameEl = document.getElementById("hostname");
        const currentLeaseCountEl = document.getElementById("currentLeaseCount");
        const statusBanner = document.getElementById("statusBanner");
        const themeToggle = document.getElementById("themeToggle");
        // === State Variables ===
        let currentFileMtime = null;   // mtime from latest /system-info response
        let previousFileMtime = null;  // mtime of last lease fetch (change detection)
        let connected = true;          // connection status for banner display

        // === Uptime Formatting ===
        function formatUptime(seconds) {
            const d = Math.floor(seconds / (3600 * 24));
            const h = Math.floor((seconds % (3600 * 24)) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${d}d ${h}h ${m}m ${s}s`;
        }

        // === Theme Handling ===
        // Cycles through 3 themes: light → dark → retro → light.
        const themes = ["light", "dark", "retro"];
        const themeLabels = { light: "🌙 Dark", dark: "💻 Retro", retro: "🌞 Light" };
        function setTheme() {
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const savedTheme = localStorage.getItem("theme");
            let effectiveTheme = savedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", effectiveTheme);
            themeToggle.innerHTML = themeLabels[effectiveTheme] + " Mode";
            themeToggle.setAttribute("aria-pressed", effectiveTheme !== "light");
        }

        themeToggle.addEventListener("click", () => {
            const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
            const currentIndex = themes.indexOf(currentTheme);
            const nextTheme = themes[(currentIndex + 1) % themes.length];
            localStorage.setItem("theme", nextTheme);
            setTheme();
        });

        setTheme();

        // === Connection Status ===
        function setConnected(ok) {
            if (ok === connected) return;  // skip if state hasn't changed
            connected = ok;
            if (ok) {
                statusBanner.className = "ok";
                statusBanner.textContent = "Connection restored";
                setTimeout(() => { statusBanner.className = ""; statusBanner.textContent = ""; }, 3000);  // auto-hide after 3s
            } else {
                statusBanner.className = "error";
                statusBanner.textContent = "Cannot connect to server";
            }
        }

        // === Data Fetching ===
        // Fetches system info, updates UI, then triggers lease refresh if file changed.
        // The /system-info endpoint provides fileMtime; fetchLeases skips if unchanged.
        async function fetchSystemInfo() {
            try {
                const response = await fetch("/system-info");
                if (!response.ok) {
                    const errorData = await response.json();
                    throw { status: response.status, error: errorData.error };
                }
                const systemInfo = await response.json();
                cpuLoadEl.textContent = systemInfo.cpuLoad;
                memUsageEl.textContent = `${systemInfo.memUsage}%`;
                uptimeEl.textContent = formatUptime(systemInfo.uptime);
                if (systemInfo.rebootRequired) {
                    uptimeLabelEl.textContent = "Uptime (reboot required)";
                } else {
                    uptimeLabelEl.textContent = "Uptime";
                }
                hostnameEl.textContent = systemInfo.hostname;
                currentFileMtime = systemInfo.fileMtime;
                await fetchLeases();
                setConnected(true);
            } catch (error) {
                if (error.status === 500) {
                    // tableBody.innerHTML = "";  // This will also empty the table on errors
                    currentLeaseCountEl.textContent = "-- NOT UPDATING";
                    const timestamp = new Date().toLocaleString();
                    statusBanner.className = "error";
                    statusBanner.textContent = `${error.error} (${timestamp}) - Reload page to clear`;
                } else {
                    setConnected(false);
                }
            }
        }

        async function fetchLeases() {
            // Skip fetch if lease file hasn't changed since last update.
            if (currentFileMtime !== null && currentFileMtime === previousFileMtime) return;

            const response = await fetch("/leases");
            if (!response.ok) {
                const errorData = await response.json();
                throw { status: response.status, error: errorData.error };
            }
            const data = await response.json();
            const leases = data.leases;
            currentLeaseCountEl.textContent = leases.length;
            displayLeases(leases);
            lastRefreshedSpan.textContent = new Date(currentFileMtime).toLocaleString();
            previousFileMtime = currentFileMtime;
        }

        // === Lease Rendering ===
        function displayLeases(leases) {
            tableBody.innerHTML = "";
            if (leases.length === 0) {
                const row = document.createElement("tr");
                const td = document.createElement("td");
                td.colSpan = 4;
                td.textContent = "No DHCP leases found";
                td.style.textAlign = "center";
                row.appendChild(td);
                tableBody.appendChild(row);
                return;
            }
            leases.forEach((lease) => {
                const row = document.createElement("tr");
                
                const expiryTd = document.createElement("td");
                expiryTd.textContent = new Date(lease.expiry * 1000).toLocaleString();
                row.appendChild(expiryTd);
                
                row.appendChild(createCopyableCell(lease.mac));
                row.appendChild(createCopyableCell(lease.ip));
                row.appendChild(createCopyableCell(lease.hostname));
                
                tableBody.appendChild(row);
            });
        }

        function createCopyableCell(text) {
            const td = document.createElement("td");
            td.className = "copyable";
            td.onclick = () => copyCell(td);
            const valueSpan = document.createElement("span");
            valueSpan.textContent = text;
            td.appendChild(valueSpan);
            const copyIcon = document.createElement("span");
            copyIcon.className = "copy-icon";
            copyIcon.textContent = "copy";
            td.appendChild(copyIcon);
            const copiedSpan = document.createElement("span");
            copiedSpan.className = "copied";
            copiedSpan.textContent = "Copied!";
            td.appendChild(copiedSpan);
            return td;
        }

        function copyCell(td) {
            const valueSpan = td.querySelector("span:first-child");
            const copiedSpan = td.querySelector(".copied");
            const text = valueSpan.textContent;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showCopied(copiedSpan);
                }).catch(() => {
                    fallbackCopy(text, copiedSpan);
                });
            } else {
                fallbackCopy(text, copiedSpan);
            }
        }

        function fallbackCopy(text, copiedSpan) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand("copy");
                showCopied(copiedSpan);
            } catch (err) {
                console.error("Failed to copy:", err);
            }
            document.body.removeChild(textarea);
        }

        function showCopied(copiedSpan) {
            copiedSpan.classList.add("visible");
            setTimeout(() => copiedSpan.classList.remove("visible"), 3000);
        }

        // === Bootstrap ===
        // Initial fetch on page load, then poll every 5 seconds.
        fetchSystemInfo();
        setInterval(fetchSystemInfo, 5000);
    </script>
</body>
</html>
